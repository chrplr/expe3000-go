name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_os: linux
            artifact_arch: x86_64
          - goos: linux
            goarch: arm64
            artifact_os: linux
            artifact_arch: arm64
          - goos: windows
            goarch: amd64
            artifact_os: windows
            artifact_arch: x86_64
            extension: .exe
          - goos: windows
            goarch: arm64
            artifact_os: windows
            artifact_arch: arm64
            extension: .exe
          - goos: darwin
            goarch: amd64
            artifact_os: macos
            artifact_arch: x86_64
          - goos: darwin
            goarch: arm64
            artifact_os: macos
            artifact_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build
        run: |
          mkdir -p dist
          
          # Get version info similar to build.sh
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          LDFLAGS="-X 'expe3000/internal/version.Version=$VERSION' \
                   -X 'expe3000/internal/version.GitCommit=$COMMIT' \
                   -X 'expe3000/internal/version.BuildTime=$BUILD_TIME'"
          
          # Build CLI
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags "$LDFLAGS" -o dist/expe3000${{ matrix.extension }} ./cmd/expe3000
          
          # Build GUI
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags "$LDFLAGS" -o dist/expe3000-gui${{ matrix.extension }} ./cmd/expe3000-gui

          # Package assets if they exist (optional, but good for a complete package)
          cp README.md dist/README.txt 2>/dev/null || true
          cp experiment.csv dist/ 2>/dev/null || true
          if [ -d "assets" ]; then cp -r assets dist/; fi

          # Create archives with a parent folder
          ARCHIVE_NAME=expe3000-$VERSION-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}-binary
          mkdir $ARCHIVE_NAME
          cp -r dist/* $ARCHIVE_NAME/
          
          if [ "${{ matrix.goos }}" == "windows" ]; then
            zip -r $ARCHIVE_NAME.zip $ARCHIVE_NAME
          else
            tar -czvf $ARCHIVE_NAME.tar.gz $ARCHIVE_NAME
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expe3000-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}-binary
          path: expe3000-*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: expe3000-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/expe3000-*.*
          generate_release_notes: true
